name: CI

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'global/**'
      - '.github/workflows/ci.yml'
      - '.github/scripts/**'

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - module: global/backend
            id: backend
          - module: global/vpc
            id: vpc
          - module: global/iam
            id: iam
          - module: global/gke
            id: gke
          - module: global/tailscale
            id: tailscale

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/597630476693/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider'
          service_account: 'github-actions-infra@xamos-project.iam.gserviceaccount.com'

      - name: Setup Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          audience: 'api.tailscale.com/${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}'
          tags: tag:ci

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.11.6

      - name: OpenTofu Init
        working-directory: ${{ matrix.module }}
        run: tofu init

      - name: OpenTofu Plan
        working-directory: ${{ matrix.module }}
        id: plan
        run: |
          TAILSCALE_IDENTITY_TOKEN=$(curl -sLS "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=api.tailscale.com/${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}" -H "User-Agent: actions/oidc-client" -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" | jq -r '.value')
          echo "::add-mask::$TAILSCALE_IDENTITY_TOKEN"
          export TAILSCALE_IDENTITY_TOKEN
          tofu plan -no-color -out=infra.tfplan
        env:
          TAILSCALE_OAUTH_CLIENT_ID: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}

      - name: Generate Plan Summary
        if: success()
        working-directory: ${{ matrix.module }}
        run: tofu show -no-color infra.tfplan > plan_summary.txt

      - name: Generate Error Summary
        if: failure()
        working-directory: ${{ matrix.module }}
        run: echo "Plan failed. See job logs for details." > plan_summary.txt

      - name: Upload Plan Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: plan-${{ matrix.id }}
          path: ${{ matrix.module }}/infra.tfplan
          retention-days: 7

      - name: Upload Text Summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: summary-${{ matrix.id }}
          path: ${{ matrix.module }}/plan_summary.txt
          retention-days: 7

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          hide-progress: true
          format: 'json'
          output: 'trivy-results.json'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'

      - name: Upload Trivy Results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.json
          retention-days: 7

  report:
    name: Report
    runs-on: ubuntu-latest
    needs: [plan, security]
    if: always() # Run even if plans failed
    permissions:
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*'
          path: summaries

      - name: Assemble Markdown
        id: assemble
        run: node .github/scripts/assemble-report.js

      - name: Post Comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: report.md
