name: Infrastructure Plan

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'global/**'
      - '.github/workflows/infra-plan.yml'

jobs:
  plan:
    name: OpenTofu Plan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        module: [global/vpc, global/gke, global/iam]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/597630476693/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider'
          service_account: 'github-actions-infra@xamos-project.iam.gserviceaccount.com'

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.11.6

      - name: OpenTofu Init
        working-directory: ${{ matrix.module }}
        run: tofu init

      - name: OpenTofu Plan
        working-directory: ${{ matrix.module }}
        id: plan
        run: tofu plan -no-color -out=infra.tfplan

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.pull_request.number }}-${{ strategy.job-index }}-plan
          path: ${{ matrix.module }}/infra.tfplan
          retention-days: 7

      - name: Post Plan Comment
        uses: actions/github-script@v7
        with:
          script: |
            const module = "${{ matrix.module }}";
            const run_id = "${{ github.run_id }}";
            const artifact_name = "${{ github.event.pull_request.number }}-${{ strategy.job-index }}-plan";

            const body = `### 🛡️ Infrastructure Plan Ready: \`${module}\`

            A new plan has been generated. To apply this plan locally:

            **1. Download the artifact:**
            \`\`\`bash
            gh run download ${run_id} -n ${artifact_name} -D ${module}
            \`\`\`

            **2. Apply the specific plan:**
            \`\`\`bash
            cd ${module} && tofu apply infra.tfplan
            \`\`\`

            *Note: Plan generated by GitHub Actions run [${run_id}](https://github.com/${{ github.repository }}/actions/runs/${run_id}).*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            })
