name: Infrastructure Plan

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'global/**'
      - '.github/workflows/infra-plan.yml'
      - '.github/scripts/**'

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - module: global/vpc
            id: vpc
          - module: global/gke
            id: gke
          - module: global/iam
            id: iam

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/597630476693/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider'
          service_account: 'github-actions-infra@xamos-project.iam.gserviceaccount.com'

      - name: Authenticate to AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::368476149685:role/github-actions-xamos-portfolio-infra-role
          aws-region: us-east-1

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.11.6

      - name: OpenTofu Init
        working-directory: ${{ matrix.module }}
        run: tofu init

      - name: OpenTofu Plan
        working-directory: ${{ matrix.module }}
        id: plan
        continue-on-error: true
        run: tofu plan -no-color -out=infra.tfplan

      - name: Generate Plan Summary
        if: steps.plan.outcome == 'success'
        working-directory: ${{ matrix.module }}
        run: tofu show -no-color infra.tfplan > plan_summary.txt

      - name: Generate Error Summary
        if: steps.plan.outcome == 'failure'
        working-directory: ${{ matrix.module }}
        run: echo "Plan failed. Check logs for details." > plan_summary.txt

      - name: Upload Plan Artifact
        if: steps.plan.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: plan-${{ matrix.id }}
          path: ${{ matrix.module }}/infra.tfplan
          retention-days: 7

      - name: Upload Text Summary
        uses: actions/upload-artifact@v4
        with:
          name: summary-${{ matrix.id }}
          path: ${{ matrix.module }}/plan_summary.txt
          retention-days: 7

  report:
    name: Report
    runs-on: ubuntu-latest
    needs: [plan]
    permissions:
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download all summaries
        uses: actions/download-artifact@v4
        with:
          pattern: summary-*
          path: summaries

      - name: Assemble Markdown
        id: assemble
        run: node .github/scripts/assemble-report.js

      - name: Post Comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: report.md
